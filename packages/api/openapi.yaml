openapi: 3.1.0

info:
  title: Restaurant Discovery API
  version: 1.0.0
  description: REST API for restaurant discovery, reviews, favorites, ownership requests, owner management, and admin moderation.

servers:
  - url: /api
    description: Default server

tags:
  - name: Auth
    description: Authentication and session management
  - name: Restaurants
    description: Restaurant brands and public discovery
  - name: Branches
    description: Physical restaurant branches
  - name: Reviews
    description: Customer reviews for branches
  - name: Images
    description: Branch images
  - name: Favorites
    description: Saved restaurants
  - name: Restaurant Claims
    description: Ownership requests
  - name: Admin
    description: Admin moderation and logs

# ─── Reusable components ───────────────────────────────────────────────────────
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: accessToken
      description: HttpOnly access token cookie set on login

  schemas:
    RegisterBody:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 8
          description: Must contain at least one uppercase letter and one number
          example: Password1
        name:
          type: string
          minLength: 2
          maxLength: 100
          example: Jane Doe

    LoginBody:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 1
          example: Password1

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 123e4567-e89b-12d3-a456-426614174000
        email:
          type: string
          format: email
          example: user@example.com
        name:
          type: string
          example: Jane Doe
        role:
          type: string
          enum: [user, admin]
          example: user
        createdAt:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00.000Z"

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Invalid credentials

    MessageResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            message:
              type: string
              example: Success

    ValidationErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Validation failed
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: email
              message:
                type: string
                example: Invalid email address

    Restaurant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Pizza Hut
        description:
          type: string
        cuisineType:
          type: string
          example: Italian
        priceRange:
          type: string
          enum: [$, $$, $$$, $$$$]
          example: $$
        verified:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Branch:
      type: object
      properties:
        id:
          type: string
          format: uuid
        restaurantId:
          type: string
          format: uuid
        name:
          type: string
          example: Beirut Branch
        address:
          type: string
        city:
          type: string
          example: Beirut
        latitude:
          type: number
          format: float
        longitude:
          type: number
          format: float
        phone:
          type: string
        openingHours:
          type: object
          example:
            monday: "09:00-23:00"
            tuesday: "09:00-23:00"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
# ─── Paths ─────────────────────────────────────────────────────────────────────
paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and receive auth cookies
      operationId: login
      description: >
        On success, sets two HttpOnly cookies: `accessToken` (15 min) and
        `refreshToken` (7 days). Include `credentials: "include"` in fetch calls.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          headers:
            Set-Cookie:
              schema:
                type: string
                example: accessToken=...; HttpOnly; Path=/api
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      user:
                        $ref: "#/components/schemas/User"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh the access token
      operationId: refreshToken
      description: Reads the `refreshToken` cookie and issues new auth cookies.
      responses:
        "200":
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Missing or invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and clear auth cookies
      operationId: logout
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      tags: [Auth]
      summary: Get the current authenticated user
      operationId: getMe
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /restaurants:
    get:
      tags: [Restaurants]
      summary: Get all restaurants
      responses:
        "200":
          description: List of restaurants

  /restaurants/{restaurantId}:
    get:
      tags: [Restaurants]
      summary: Get restaurant details
      parameters:
        - in: path
          name: restaurantId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Restaurant details

  /restaurants/{restaurantId}/branches:
    get:
      tags: [Branches]
      summary: Get branches for a restaurant
      parameters:
        - in: path
          name: restaurantId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of branches

  /branches/{branchId}:
    get:
      tags: [Branches]
      summary: Get branch details
      parameters:
        - in: path
          name: branchId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Branch details

  /branches/{branchId}/reviews:
    get:
      tags: [Reviews]
      summary: Get reviews for a branch
      parameters:
        - in: path
          name: branchId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of reviews

    post:
      tags: [Reviews]
      summary: Create a review for a branch
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: branchId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rating]
              properties:
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                  example: 5
                comment:
                  type: string
                  example: The pasta was amazing.
      responses:
        "201":
          description: Review created
        "401":
          description: Unauthorized

  /reviews/{reviewId}:
    patch:
      tags: [Reviews]
      summary: Update my review
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: reviewId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                  example: 4
                comment:
                  type: string
                  example: Good food, but service was slow.
      responses:
        "200":
          description: Review updated
        "401":
          description: Unauthorized
        "403":
          description: Cannot edit another user's review

    delete:
      tags: [Reviews]
      summary: Delete my review
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: reviewId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Review deleted
        "401":
          description: Unauthorized
        "403":
          description: Cannot delete another user's review

  /favorites:
    get:
      tags: [Favorites]
      summary: Get my favorite restaurants
      security:
        - cookieAuth: []
      responses:
        "200":
          description: List of favorite restaurants
        "401":
          description: Unauthorized

  /favorites/{restaurantId}:
    post:
      tags: [Favorites]
      summary: Add restaurant to favorites
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: restaurantId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Restaurant added to favorites
        "401":
          description: Unauthorized

    delete:
      tags: [Favorites]
      summary: Remove restaurant from favorites
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: restaurantId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Restaurant removed from favorites
        "401":
          description: Unauthorized
  /restaurant-claims:
    post:
      tags: [Restaurant Claims]
      summary: Submit a restaurant ownership request
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - restaurantId
              properties:
                restaurantId:
                  type: string
                  format: uuid
                message:
                  type: string
                  example: I am the owner of this restaurant.
      responses:
        "201":
          description: Ownership request submitted
        "401":
          description: Unauthorized

    get:
      tags: [Restaurant Claims]
      summary: Get my ownership requests
      security:
        - cookieAuth: []
      responses:
        "200":
          description: List of my ownership requests
        "401":
          description: Unauthorized

  /admin/restaurant-claims:
    get:
      tags: [Admin]
      summary: Get all restaurant ownership requests
      security:
        - cookieAuth: []
      responses:
        "200":
          description: List of ownership requests
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /admin/restaurant-claims/{claimId}/approve:
    patch:
      tags: [Admin]
      summary: Approve a restaurant ownership request
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: claimId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Ownership request approved
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /admin/restaurant-claims/{claimId}/reject:
    patch:
      tags: [Admin]
      summary: Reject a restaurant ownership request
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: claimId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Ownership request rejected
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
  
  /admin/restaurants/{restaurantId}/verify:
    patch:
      tags: [Admin]
      summary: Verify a restaurant
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: restaurantId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Restaurant verified
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /admin/reviews:
    get:
      tags: [Admin]
      summary: Get all reviews
      security:
        - cookieAuth: []
      responses:
        "200":
          description: List of reviews

  /admin/reviews/{reviewId}:
    delete:
      tags: [Admin]
      summary: Remove a review
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: reviewId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Review removed
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /admin/imports/restaurants:
    post:
      tags: [Admin]
      summary: Import restaurants from external sources
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Import started
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /admin/imports/logs:
    get:
      tags: [Admin]
      summary: Get restaurant import logs
      security:
        - cookieAuth: []
      responses:
        "200":
          description: List of import logs
        "401":
          description: Unauthorized
        "403":
          description: Forbidden